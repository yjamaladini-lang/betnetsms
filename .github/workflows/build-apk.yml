name: Build Betnet APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Betnet-SMS-Sender-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Betnet-SMS-Sender-APK
          path: Betnet-SMS-Sender-debug.apk
          if-no-files-found: error
          retention-days: 14
